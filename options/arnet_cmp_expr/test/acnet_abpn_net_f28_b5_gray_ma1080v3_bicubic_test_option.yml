name: ACNet_ABPN_Net_F28_B5_GRAY_MA1080V3_BICUBIC_Test
model_type: AnimeSISRNetModel
scale: 2
num_gpu: 1
manual_seed: 0

datasets:
  test_1:
    name: ModernAnimation1080_v3
    type: AnimeSISRDataset
    dataroot_gt: D:/program/datasets/ModernAnimation1080_v3/valHR
    image_mode: L
    degrade_type: bicubic

  test_2:
    name: ClassicAnimation
    type: AnimeSISRDataset
    dataroot_gt: D:/program/datasets/ClassicAnimation/HR_val
    image_mode: L
    degrade_type: bicubic

  test_3:
    name: ClassicAnimation_DNR
    type: AnimeSISRDataset
    dataroot_gt: D:/program/datasets/ClassicAnimation/DNR_val
    image_mode: L
    degrade_type: bicubic

  test_4:
    name: HFA2K
    type: AnimeSISRDataset
    dataroot_gt: D:/program/datasets/HFA2K
    image_mode: L
    degrade_type: bicubic

  test_5:
    name: FHD-Anime
    type: AnimeSISRDataset
    dataroot_gt: D:/program/datasets/FHD-Anime
    image_mode: L
    degrade_type: bicubic

network_g:
  type: ACNet_ABPN
  num_in_ch: 1
  num_out_ch: 1
  scale: 2
  num_feat: 28
  num_block: 5

path:
  pretrain_network_g: experiments/l1_trained_models/gray_ma1080v3_bicubic/ACNet_ABPN_F28B5.pth
  param_key_g: params_ema
  strict_load_g: true

val:
  save_img: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
